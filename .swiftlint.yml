included:
  - iOS/Sources
  - iOS/Tests

excluded:
  - .build
  - .swiftpm
  - iOS/.build
  - iOS/.swiftpm

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - fatal_error_message
  - redundant_nil_coalescing

disabled_rules:
  - trailing_whitespace
  - large_tuple

line_length:
  warning: 140
  error: 180

function_body_length:
  warning: 120
  error: 160

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 800
  error: 1200

identifier_name:
  allowed_symbols:
    - "_"
  min_length:
    warning: 1
    error: 1

reporter: xcode
